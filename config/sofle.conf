# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Nice OLED Widgets - Minimal config for debugging
# Base WPM widget (required for BONGO_CAT)
CONFIG_NICE_OLED_WIDGET_WPM=y
# Bongo Cat animation
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT_ANIMATION_MS=300

# Modifiers indicator
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y

# Peripheral animation
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_MS=300

# === Bluetooth Split Connection Stability ===
# Increase timeout for peripheral connection
CONFIG_ZMK_SPLIT_PERIPHERAL_TIMEOUT=60000
# Enable battery status reporting
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_BATTERY=y
# Improve connection stability with slower interval
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=3000
CONFIG_BT_PERIPH_PREF_INTERVAL=50
# Disable power save for more stable connection (trade-off: higher battery usage)
# CONFIG_ZMK_BLE_PASSIVE_ENTRY=n
